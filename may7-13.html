 if(t.isVideo){
  h+='<div class="legend-item"><span class="dot dot-g"></span>Hook/Hold &ge; 20%</div>';
  h+='<div class="legend-item"><span class="dot dot-y"></span>Hook/Hold 15&ndash;20%</div>';
  h+='<div class="legend-item"><span class="dot dot-r"></span>Hook/Hold &lt; 15%</div>';
 }
 h+='<div class="legend-item"><span class="dot dot-gr"></span>No Data</div>';
 document.getElementById('legend').innerHTML=h;
}
function buildTabs(){
 let h='';
 TABS.forEach((t,i)=>{
  const n=(DATA[t.key]||[]).length;
  h+='<div class="tab'+(i===curTab?' active':'')+'" onclick="switchTab('+i+')">'+t.label+' <span class="cnt">('+n+')</span></div>';
 });
 document.getElementById('tabBar').innerHTML=h;
}
function getCols(){
 const t=TABS[curTab];
 let cols=[
  {key:'idx',label:'#',sortable:false,cls:'col-idx'},
  {key:'name',label:'Name',sortable:true,cls:'col-name'},
  {key:'link',label:'Ad',sortable:false},
  {key:'brief',label:'Brief',sortable:false},
  {key:'cost',label:'Spend',sortable:true},
  {key:'leads',label:'Leads',sortable:true},
  {key:'cpl',label:'CPL',sortable:true,badge:'cpl'},
  {key:'qa',label:'QA',sortable:true},
  {key:'cpqa',label:'CPQA',sortable:true,badge:'cpqa'},
  {key:'mql',label:'MQL',sortable:true},
  {key:'cpmql',label:'CPMQL',sortable:true},
  {key:'sql',label:'SQL',sortable:true},
  {key:'cpsql',label:'CPSQL',sortable:true},
  {key:'cust',label:'Cust',sortable:true},
  {key:'cac',label:'CAC',sortable:true,badge:'cac'}
 ];
 if(t.isVideo){
  cols.push({key:'hookRate',label:'Hook %',sortable:true,badge:'hookRate'});
  cols.push({key:'holdRate',label:'Hold %',sortable:true,badge:'holdRate'});
 }
 cols.push(
  {key:'ctrAll',label:'CTR (all)',sortable:true},
  {key:'ctrLink',label:'CTR (link)',sortable:true},
  {key:'cpm',label:'CPM',sortable:true},
  {key:'impressions',label:'Impr',sortable:true}
 );
 return cols;
}
function renderTable(){
 const t=TABS[curTab];
 const cols=getCols();
 const data=(DATA[t.key]||[]).slice();
 const q=document.getElementById('search').value.toLowerCase();
 let filtered=data.filter(r=>{
  if(q&&!r.name.toLowerCase().includes(q))return false;
  if(filters.spend&&(r.cost==null||r.cost<1500))return false;
  if(filters.winners&&(r.cpqa==null||r.cpqa>500))return false;
  return true;
 });
 filtered.sort((a,b)=>{
  let va=a[sortCol],vb=b[sortCol];
  if(va==null&&vb==null)return 0;
  if(va==null)return 1;
  if(vb==null)return -1;
  if(typeof va==='string')return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
  return sortAsc?va-vb:vb-va;
 });
 let th='<tr>';
 cols.forEach(c=>{
  const sorted=c.key===sortCol;
  const arr=sorted?(sortAsc?'&#9650;':'&#9660;'):'&#9650;';
  const cls=(c.cls||'')+(sorted?' sorted':'');
  if(c.sortable)th+='<th class="'+cls+'" onclick="doSort(\''+c.key+'\')">'+c.label+'<span class="arr">'+arr+'</span></th>';
  else th+='<th class="'+cls+'">'+c.label+'</th>';
 });
 th+='</tr>';
 document.getElementById('thead').innerHTML=th;
 let tb='';
 // Rollup row for gender tabs
 if(t.isGender && t.rollupKey && DATA[t.rollupKey]){
  const rr=DATA[t.rollupKey];
  tb+='<tr class="rollup-row">';
  cols.forEach(c=>{
   const cls=c.cls||'';
   if(c.key==='idx'){tb+='<td class="'+cls+'">&Sigma;</td>';return;}
   if(c.key==='name'){tb+='<td class="'+cls+'">'+(rr.name||'TOTAL')+'</td>';return;}
   if(c.key==='link'){tb+='<td><span class="nd">&mdash;</span></td>';return;}
   if(c.key==='cost'){tb+='<td>'+fmt$(rr.cost)+'</td>';return;}
   if(c.key==='leads'||c.key==='qa'||c.key==='mql'||c.key==='sql'||c.key==='cust'||c.key==='impressions'){tb+='<td>'+fmtN(rr[c.key])+'</td>';return;}
   if(c.badge){tb+='<td>'+fmtBadge(rr[c.key],c.badge)+'</td>';return;}
   if(c.key==='ctrAll'||c.key==='ctrLink'){tb+='<td>'+fmtP(rr[c.key])+'</td>';return;}
   if(c.key==='cpm'||c.key==='cpmql'||c.key==='cpsql'){tb+='<td>'+fmtD(rr[c.key])+'</td>';return;}
   tb+='<td>'+fmtN(rr[c.key])+'</td>';
  });
  tb+='</tr>';
 }
 filtered.forEach((r,i)=>{
  tb+='<tr>';
  cols.forEach(c=>{
   const cls=c.cls||'';
   if(c.key==='idx'){tb+='<td class="'+cls+'">'+(i+1)+'</td>';return;}
   if(c.key==='name'){tb+='<td class="'+cls+'" title="'+(r.name||'').replace(/"/g,'&quot;')+'">'+(r.name||'')+'</td>';return;}
   if(c.key==='link'){tb+='<td>'+fmtLink(r.link)+'</td>';return;}
   if(c.key==='brief'){tb+='<td>'+fmtBrief(r.brief)+'</td>';return;}
   if(c.key==='cost'){tb+='<td>'+fmt$(r.cost)+'</td>';return;}
   if(c.key==='leads'||c.key==='qa'||c.key==='mql'||c.key==='sql'||c.key==='cust'||c.key==='impressions'){tb+='<td>'+fmtN(r[c.key])+'</td>';return;}
   if(c.badge){tb+='<td>'+fmtBadge(r[c.key],c.badge)+'</td>';return;}
   if(c.key==='ctrAll'||c.key==='ctrLink'){tb+='<td>'+fmtP(r[c.key])+'</td>';return;}
   if(c.key==='cpm'||c.key==='cpmql'||c.key==='cpsql'){tb+='<td>'+fmtD(r[c.key])+'</td>';return;}
   tb+='<td>'+fmtN(r[c.key])+'</td>';
  });
  tb+='</tr>';
 });
 document.getElementById('tbody').innerHTML=tb;
 document.getElementById('rowCount').textContent=filtered.length+' of '+data.length+' creatives';
}
function switchTab(i){curTab=i;sortCol='cpqa';sortAsc=true;buildTabs();buildLegend();renderTable();}
function doSort(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=(col==='name'||col==='cpqa'||col==='cpl'||col==='cac');}renderTable();}
function toggleFilter(f){filters[f]=!filters[f];document.getElementById(f==='winners'?'btnWinners':'btnSpend').classList.toggle('active');renderTable();}
document.getElementById('search').addEventListener('input',renderTable);
buildTabs();buildLegend();renderTable();
</script>
</body></html>
